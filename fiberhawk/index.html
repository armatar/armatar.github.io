<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Armatar Fiberhawk 17 FPV drone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #333;
        }

        .header {
            background-color: #1e3a8a;
            color: white;
            text-align: center;
            padding: 2rem 1rem;
            position: relative;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        .main {
            padding: 2rem 0;
        }

        .section {
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        h2 {
            font-size: 1.25rem;
            margin: 1.5rem 0 1rem;
            color: #1e3a8a;
        }

        .contact-info {
            margin-bottom: 1rem;
        }

        .contact-info p {
            margin-bottom: 0.5rem;
        }

        .checklist {
            list-style: none;
            margin-left: 1rem;
            margin-bottom: 1rem;
        }

        .checklist li {
            margin-bottom: 0.5rem;
            position: relative;
            padding-left: 1rem;
        }

        .checklist li:before {
            content: "•";
            position: absolute;
            left: -1rem;
        }

        .important-note {
            background-color: #f8f9fa;
            padding: 1rem;
            margin: 1rem 0;
            border-left: 4px solid #1e3a8a;
        }

        .footer {
            background-color: #1e293b;
            color: white;
            text-align: center;
            padding: 1rem;
            margin-top: 2rem;
        }

        .language-switch {
            position: absolute;
            top: 1rem;
            right: 1rem;
        }

        .language-switch a {
            color: white;
            text-decoration: none;
            padding: 0.5rem;
        }

        a {
            color: #1e3a8a;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        /* Technical Specifications Styles */
        .specs-title {
            color: #1e3a8a;
            font-size: 1.4rem;
            margin: 2rem 0 1rem;
            border-bottom: 2px solid #1e3a8a;
            padding-bottom: 0.5rem;
        }

        .specs-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.25rem;
            margin-top: 1rem;
        }

        .specs-section {
            background: #f8fafc;
            padding: 1.25rem;
            border-radius: 8px;
            height: fit-content;
        }

        .specs-section.full-width {
            grid-column: 1 / -1;
        }

        .specs-section.span-2 {
            grid-column: span 2;
        }

        .specs-section h3 {
            color: #1e3a8a;
            margin-bottom: 1rem;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .specs-section ul {
            list-style: none;
        }

        .specs-section li {
            margin-bottom: 0.5rem;
            padding-left: 1rem;
            position: relative;
            font-size: 0.95rem;
        }

        .specs-section li:last-child {
            margin-bottom: 0;
        }

        .specs-section li:before {
            content: "•";
            position: absolute;
            left: 0;
            color: #1e3a8a;
        }

        @media (max-width: 1024px) {
            .specs-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .specs-section.span-2 {
                grid-column: auto;
            }
        }

        @media (max-width: 768px) {
            .specs-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .specs-section.full-width,
            .specs-section.span-2 {
                grid-column: auto;
            }

            .container {
                padding: 0 0.75rem;
            }

            h1 {
                font-size: 1.75rem;
            }

            .specs-title {
                font-size: 1.25rem;
            }

            .specs-section {
                padding: 1rem;
            }

            .specs-section h3 {
                font-size: 1.1rem;
            }

            .specs-section li {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="language-switch">
                <a href="uk.html">UA</a>
            </div>
            <h1>Armatar Fiberhawk 17 FPV drone</h1>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="contact-info">
                <p>For improvements and troubleshooting, please email: <a href="mailto:fiberhawk@armatar.com">fiberhawk@armatar.com</a></p>
                <p>For latest and more detailed information, visit <a href="https://armatar.com/fiberhawk/">https://armatar.com/fiberhawk/</a></p>
            </div>

        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Armatar. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
